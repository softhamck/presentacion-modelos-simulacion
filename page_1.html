<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=1280, height=720" name="viewport" />
    <title>Taller 2: Modelos y Simulación</title>
    <script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css" rel="stylesheet" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap");

        body {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background-color: #F4F7F6;
            font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif
        }

        .cover-main-slide-root {
            width: 1280px;
            height: 720px;
            background-color: #F4F7F6;
            display: flex;
            flex-direction: row
        }

        .cover-left-content-area {
            width: 60%;
            display: flex;
            flex-direction: column;
            padding: 80px 60px 80px 80px;
            background-color: #F4F7F6
        }

        .cover-right-image-area {
            width: 40%;
            height: 720px;
            overflow: hidden
        }

        .cover-stadium-image-element {
            width: 100%;
            height: 720px;
            object-fit: cover;
            display: block
        }

        .brand-institution-header-text {
            font-size: 18px;
            font-weight: 400;
            color: #7F8C8D;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 80px
        }

        .title-section-main-container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px
        }

        .title-vertical-accent-line {
            width: 6px;
            height: 100px;
            background-color: #27AE60;
            border-radius: 3px;
            margin-top: 8px
        }

        .title-heading-text-stack {
            display: flex;
            flex-direction: column
        }

        .title-primary-display-heading {
            font-size: 56px;
            font-weight: 700;
            color: #2C3E50;
            margin: 0;
            line-height: 1.1
        }

        .title-secondary-subtext-label {
            font-size: 20px;
            font-weight: 400;
            color: #2980B9;
            margin-top: 15px;
            line-height: 1.4;
            max-width: 500px
        }

        .authors-list-wrapper-container {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .author-individual-name-detail {
            font-size: 18px;
            font-weight: 400;
            color: #2C3E50;
            margin: 0
        }

        .footer-metadata-info-container {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .footer-date-text-display {
            font-size: 16px;
            font-weight: 400;
            color: #95A5A6;
            margin: 0
        }

        .footer-course-tag-label {
            font-size: 14px;
            font-weight: 700;
            color: #27AE60;
            text-transform: uppercase;
            margin-bottom: 5px
        }

        html {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="cover-main-slide-root" style="overflow: hidden;">
        <!-- Content Section -->
        <div class="cover-left-content-area">
            <div class="brand-institution-header-text">
                Institución Universitaria Pascual Bravo
            </div>
            <div class="title-section-main-container">
                <div class="title-vertical-accent-line"></div>
                <div class="title-heading-text-stack">
                    <h1 class="title-primary-display-heading">
                        Taller 2: Modelos y Simulación
                    </h1>
                    <div class="title-secondary-subtext-label">
                        Lógica Difusa, Simulación Montecarlo y Modelos de Regresión Aplicados al Deporte y la Salud
                    </div>
                </div>
            </div>
            <div class="authors-list-wrapper-container">
                <div class="footer-course-tag-label">Autores</div>
                <div class="author-individual-name-detail">Camilo Andrés Fuentes Morales</div>
                <div class="author-individual-name-detail">Andrea Muñoz Cano</div>
                <div class="author-individual-name-detail">Tomás Madrid Gómez</div>
            </div>
            <div class="footer-metadata-info-container">
            </div>
        </div>
        <!-- Image Section -->
        <div class="cover-right-image-area">
            <img alt="Estadio de fútbol" class="cover-stadium-image-element"
                src="https://agents-download.skywork.ai/image/ppt/7455837416688099329/2ac78de6e7265b13433a2b50f8f521e1.png" />
        </div>
    </div>
</body>

</html>
