<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=1280, height=720" name="viewport" />
  <title>Gracias</title>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #F4F7F6;
      font-family: "Segoe UI", Roboto, sans-serif;
      color: #2C3E50
    }

    .slide {
      width: 1280px;
      height: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F4F7F6
    }

    .card {
      width: 980px;
      height: 460px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .icon {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: #EAF3FB;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2E86C1;
      font-size: 36px;
      margin-bottom: 28px
    }

    .title {
      font-size: 42px;
      font-weight: 800;
      color: #24476D;
      margin: 0 0 16px 0
    }

    .subtitle {
      font-size: 18px;
      color: #27AE60;
      font-style: italic
    }
  </style>
</head>

<body>
  <div class="slide">
    <div class="card">
      <div class="icon"><i class="fa-solid fa-lightbulb"></i></div>
      <h1 class="title">¡Gracias por su atención!</h1>
      <div class="subtitle">Modelos y simulación aplicados al rendimiento físico.</div>
    </div>
  </div>
</body>

</html>
